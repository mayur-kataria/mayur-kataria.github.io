<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0813">
    <meta name="description" content="AegisCipher - 100% Offline Local Password Encryptor. Zero Network. Zero Logs. Powered by Web Crypto API.">
    <title>AegisCipher - Offline Local Encryptor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- SVG Icon Symbols (Ensures absolute zero network requests for assets) -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="icon-shield" viewBox="0 0 24 24">
            <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l7-2a1 1 0 0 1 .48 0l7 2A1 1 0 0 1 20 6v7z"/>
            <path d="M12 22V2"/>
        </symbol>
        <symbol id="icon-lock" viewBox="0 0 24 24">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </symbol>
        <symbol id="icon-unlock" viewBox="0 0 24 24">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </symbol>
        <symbol id="icon-eye" viewBox="0 0 24 24">
            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/>
            <circle cx="12" cy="12" r="3"/>
        </symbol>
        <symbol id="icon-eye-off" viewBox="0 0 24 24">
            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
            <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
            <line x1="2" x2="22" y1="2" y2="22"/>
        </symbol>
        <symbol id="icon-copy" viewBox="0 0 24 24">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </symbol>
        <symbol id="icon-settings" viewBox="0 0 24 24">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
        </symbol>
        <symbol id="icon-chevron-down" viewBox="0 0 24 24">
            <path d="m6 9 6 6 6-6"/>
        </symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24">
            <path d="M3 6h18"/>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        </symbol>
        <symbol id="icon-check" viewBox="0 0 24 24">
            <path d="M20 6 9 17l-5-5"/>
        </symbol>
        <symbol id="icon-alert" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" x2="12" y1="8" y2="12"/>
            <line x1="12" x2="12.01" y1="16" y2="16"/>
        </symbol>
    </svg>

    <main class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="brand">
                <svg class="brand-icon"><use href="#icon-shield"/></svg>
                <h1 class="brand-title" id="main-heading">AegisCipher</h1>
            </div>
            <p class="brand-tagline">Secure 100% Local Encryption Vault</p>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tab-container" role="tablist">
            <button id="tab-encrypt" class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-encrypt">
                <svg><use href="#icon-lock"/></svg>
                Encrypt
            </button>
            <button id="tab-decrypt" class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-decrypt">
                <svg><use href="#icon-unlock"/></svg>
                Decrypt
            </button>
        </nav>

        <!-- Dynamic Panels -->
        <section id="panel-encrypt" role="tabpanel" aria-labelledby="tab-encrypt">
            <!-- Plaintext Input -->
            <div class="form-group">
                <div class="label-container">
                    <label for="encrypt-input">Password/Text to Encrypt</label>
                    <button class="label-action" id="btn-generate-password" type="button">Generate Password</button>
                </div>
                <div class="input-wrapper">
                    <textarea id="encrypt-input" class="input-control" placeholder="Enter sensitive password or text here..." autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off"></textarea>
                </div>
            </div>

            <!-- Secret Key Input -->
            <div class="form-group">
                <div class="label-container">
                    <label for="encrypt-key">Secret Key (Passphrase)</label>
                </div>
                <div class="input-wrapper">
                    <input id="encrypt-key" type="password" class="input-control" placeholder="Enter your secret key..." autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off">
                    <button class="input-icon-btn toggle-password-visibility" data-target="encrypt-key" type="button">
                        <svg><use href="#icon-eye"/></svg>
                    </button>
                </div>
                <div class="strength-indicator" id="strength-indicator">
                    <div class="strength-bar" id="strength-bar"></div>
                </div>
                <div class="strength-text" id="strength-text">Strength: Weak</div>
            </div>

            <!-- Advanced Panel Toggle -->
            <button class="expandable-trigger" id="adv-trigger-encrypt" type="button">
                <span>Advanced Crypto Combo</span>
                <svg><use href="#icon-chevron-down"/></svg>
            </button>

            <!-- Advanced Cryptographic Combo Configuration -->
            <div class="expandable-content" id="adv-content-encrypt">
                <div class="options-grid">
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="encrypt-algo" style="font-size:10px;">Algorithm</label>
                        <select id="encrypt-algo" class="select-control">
                            <option value="AES-GCM" selected>AES-GCM (Recommended)</option>
                            <option value="AES-CBC">AES-CBC</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label for="encrypt-hash" style="font-size:10px;">KDF Hash</label>
                        <select id="encrypt-hash" class="select-control">
                            <option value="SHA-256" selected>SHA-256 (Fast)</option>
                            <option value="SHA-512">SHA-512 (High Sec)</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2; margin-bottom:0;">
                        <div class="label-container">
                            <label for="encrypt-iterations" style="font-size:10px;">PBKDF2 Rounds</label>
                        </div>
                        <div class="range-wrapper">
                            <input id="encrypt-iterations" type="range" min="10000" max="500000" step="10000" value="100000">
                            <span class="range-val" id="val-encrypt-iterations">100k</span>
                        </div>
                    </div>
                    <div class="form-group" style="grid-column: span 2; margin-bottom:0;">
                        <label for="encrypt-salt" style="font-size:10px;">Custom Salt (Optional)</label>
                        <input id="encrypt-salt" type="text" class="input-control" placeholder="Auto-generated if empty..." style="padding: 6px 10px; font-size:12px; border-radius:8px;" autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off">
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="btn-encrypt" class="action-btn" type="button">
                <svg><use href="#icon-lock"/></svg>
                Encrypt Locally
            </button>
        </section>

        <!-- Decrypt Panel (Hidden initially) -->
        <section id="panel-decrypt" role="tabpanel" aria-labelledby="tab-decrypt" style="display: none;">
            <!-- Cipher Payload Input -->
            <div class="form-group">
                <div class="label-container">
                    <label for="decrypt-input">Ciphertext Payload</label>
                    <button class="label-action" id="btn-paste-cipher" type="button">Paste from Clipboard</button>
                </div>
                <div class="input-wrapper">
                    <textarea id="decrypt-input" class="input-control" placeholder="Paste the AEGIS1:... encrypted package here..." autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off"></textarea>
                </div>
            </div>

            <!-- Secret Key Input -->
            <div class="form-group">
                <div class="label-container">
                    <label for="decrypt-key">Secret Key (Passphrase)</label>
                </div>
                <div class="input-wrapper">
                    <input id="decrypt-key" type="password" class="input-control" placeholder="Enter the secret key used to encrypt..." autocapitalize="none" autocorrect="off" spellcheck="false" autocomplete="off">
                    <button class="input-icon-btn toggle-password-visibility" data-target="decrypt-key" type="button">
                        <svg><use href="#icon-eye"/></svg>
                    </button>
                </div>
            </div>

            <!-- Action Button -->
            <button id="btn-decrypt" class="action-btn" type="button">
                <svg><use href="#icon-unlock"/></svg>
                Decrypt Locally
            </button>
        </section>

        <!-- Output Result Panel -->
        <section class="result-box" id="result-box" aria-live="polite">
            <div class="result-header">
                <span class="result-title" id="result-title">Result Payload</span>
            </div>
            <div class="result-content-wrapper">
                <div class="result-content" id="result-content"></div>
            </div>
            <div class="result-action-bar">
                <button class="action-chip btn-copy" id="btn-copy-result" type="button">
                    <svg><use href="#icon-copy"/></svg>
                    <span>Copy to Clipboard</span>
                </button>
                <button class="action-chip btn-clear" id="btn-clear-result" type="button">
                    <svg><use href="#icon-trash"/></svg>
                    <span>Wipe Session</span>
                </button>
            </div>
        </section>

        <!-- Interactive Safety Disclaimer -->
        <footer class="security-notice">
            <svg><use href="#icon-alert"/></svg>
            <p>
                <strong>Offline local processing active.</strong> Cryptographic keys never leave this device. For absolute safety, all keys exist purely in-memory and are cleared when this application is closed.
            </p>
        </footer>
    </main>

    <!-- Global Toast Container -->
    <div class="toast" id="toast" role="alert" aria-live="assertive">
        <svg id="toast-icon-check"><use href="#icon-check"/></svg>
        <svg id="toast-icon-error" style="display:none;"><use href="#icon-alert"/></svg>
        <span id="toast-message">Success!</span>
    </div>

    <!-- Application Script Files -->
    <script src="js/crypto.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
